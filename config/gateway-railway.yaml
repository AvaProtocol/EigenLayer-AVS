# Gateway configuration for Railway deployment (all 4 chains).
#
# One gateway service handles all chains; per-chain workers are
# discovered via Railway private DNS through the WORKER_* env vars
# (matches the existing WORKER_SEPOLIA / WORKER_BASE_SEPOLIA pattern
# already set on the gateway service).
#
# Secrets are injected via Railway sealed env vars and expanded at
# startup (see core/config.ReadYamlConfig).
#
# Required env vars on the `gateway` Railway service:
#   GATEWAY_ECDSA_PRIVATE_KEY  — EigenLayer interaction key
#   GATEWAY_JWT_SECRET         — HS256 signing key for client JWTs
#   WORKER_ETHEREUM, WORKER_BASE, WORKER_SEPOLIA, WORKER_BASE_SEPOLIA,
#   WORKER_BNB
#       host:port of each chain worker. Use Railway reference
#       variables so the topology auto-resolves and survives service
#       renames, e.g.:
#         WORKER_ETHEREUM = ${{worker-ethereum.RAILWAY_PRIVATE_DOMAIN}}:50051
#   ETHEREUM_RPC          — Ethereum mainnet HTTPS RPC (WS derived in code)
#   SEPOLIA_RPC           — Sepolia HTTPS RPC
#   BASE_RPC              — Base mainnet HTTPS RPC
#   BASE_SEPOLIA_RPC      — Base-Sepolia HTTPS RPC
#   BNB_RPC               — BNB Smart Chain mainnet HTTPS RPC
# (WebSocket URLs are auto-derived from the HTTPS URL by core/config —
# every supported provider serves both transports at the same host+path
# with only the scheme differing. Set the explicit eth_ws_url in the
# YAML only if a chain genuinely needs a separate WS endpoint.)
#   ETHEREUM_BUNDLER_URL, SEPOLIA_BUNDLER_URL,
#   BASE_BUNDLER_URL,     BASE_SEPOLIA_BUNDLER_URL
#   BNB_BUNDLER_URL      — optional; connectivity-only rollout leaves it unset
#   CONTROLLER_PRIVATE_KEY_MAINNET — controller whose address equals the
#                                 mainnet VerifyingPaymaster's verifyingSigner
#                                 (Ethereum + Base). → 0x3b6f68B9…
#   CONTROLLER_PRIVATE_KEY_TESTNET — controller whose address equals the
#                                 testnet VerifyingPaymaster's verifyingSigner
#                                 (Sepolia + Base-Sepolia). → 0x82F2Dd9a…
#                                 The controller is PER-NETWORK, not shared:
#                                 each paymaster tier accepts signatures only
#                                 from its own verifyingSigner, so a mainnet
#                                 chain MUST use the mainnet controller and a
#                                 testnet chain the testnet controller. Pairing
#                                 the mainnet paymaster with the testnet
#                                 controller breaks every sponsored UserOp
#                                 (Sentry EIGENLAYER-AVS-1W).
#   PAYMASTER_ADDRESS_MAINNET   — VerifyingPaymaster on Ethereum + Base
#   PAYMASTER_ADDRESS_TESTNET   — VerifyingPaymaster on Sepolia + Base-Sepolia
#                                 (also used as a placeholder on BNB until its
#                                  own paymaster is deployed; not called)
#   TENDERLY_ACCESS_KEY
#   TELEGRAM_BOT_TOKEN, SENDGRID_KEY, THEGRAPH_API_KEY, MORALIS_API_KEY
environment: production

db_path: /data/gateway
backup_dir: /data/gateway-backup

ecdsa_private_key: ${GATEWAY_ECDSA_PRIVATE_KEY}

# AVS contracts. enforceAuth is currently false and BLS aggregation is
# disabled, so one gateway can serve operators from any AVS chain. We
# point this at Sepolia AVS to match the existing testnet operator;
# flip to Ethereum mainnet AVS when enforceAuth is turned on.
eth_rpc_url: ${SEPOLIA_RPC}

rpc_bind_address: "0.0.0.0:2206"
http_bind_address: "0.0.0.0:8080"

avs_registry_coordinator_address: 0xcA95381802FD1398d5BF2D01243210cFb3a2b3BD
operator_state_retriever_address: 0x070E0ABE8407eb4727fC7C5284bdc1e5E5CBf605

jwt_secret: ${GATEWAY_JWT_SECRET}

# REST rate-limit overrides (default is 10/s, burst 50). Lifted on this
# test branch so the v4 jest suite — which spreads ~90 requests across
# parallel workers — doesn't get throttled into spurious "Try again in
# 1s" failures. Production should keep the conservative default.
rest_rate_limit_per_second: 200
rest_rate_limit_burst: 500

server_name: "gateway-railway"
sentry_dsn: https://d304c8708d5097f7787eeb664e4098c6@o1156669.ingest.us.sentry.io/4509386759733248
# Production gateway (api.avaprotocol.org). Sentry events tag as
# "production" so they surface on the prod paging + triage board.
sentry_environment: production

tenderly_account: "chrisli"
tenderly_project: "default"
tenderly_access_key: ${TENDERLY_ACCESS_KEY}

# Top-level smart_wallet — used by the aa package globals
# (factory + entrypoint), the startup paymaster probe, and any cmd tool
# that takes the aggregator's default chain context. In gateway mode
# this is explicitly required (no implicit fallback to chains[0]); we
# point it at Sepolia to match the AVS chain above. Per-workflow
# execution still routes via chains[] below — the top-level only
# matters for package-globals + tooling.
smart_wallet:
  eth_rpc_url: ${SEPOLIA_RPC}
  bundler_url: ${SEPOLIA_BUNDLER_URL}
  controller_private_key: ${CONTROLLER_PRIVATE_KEY_TESTNET}
  paymaster_address: ${PAYMASTER_ADDRESS_TESTNET}

# Chain workers — worker_addr is set from WORKER_* env vars so adding
# a chain is just "set another env var + add a row here".
chains:
  # Paymaster addresses AND controller keys are PER-NETWORK (a different
  # contract instance on mainnet vs testnet, each accepting signatures
  # only from its own verifyingSigner), so each chain references its
  # network's env vars. See docs/Contract.md for the deployed addresses.
  #   PAYMASTER_ADDRESS_MAINNET      → 0xf023eA29… (Ethereum + Base)
  #   PAYMASTER_ADDRESS_TESTNET      → 0xd856f532… (Sepolia + Base-Sepolia)
  #   CONTROLLER_PRIVATE_KEY_MAINNET → 0x3b6f68B9… (mainnet verifyingSigner)
  #   CONTROLLER_PRIVATE_KEY_TESTNET → 0x82F2Dd9a… (testnet verifyingSigner)
  # Using a single shared PAYMASTER_ADDRESS broke Sepolia workflows for
  # the duration of the previous deploy (Sentry EIGENLAYER-AVS-1N/1M).
  # Using a single shared CONTROLLER_PRIVATE_KEY (testnet) against the
  # mainnet paymaster broke every sponsored mainnet UserOp on Ethereum +
  # Base (Sentry EIGENLAYER-AVS-1W) — same class of bug, controller side.
  - chain_id: 1
    name: ethereum
    worker_addr: ${WORKER_ETHEREUM}
    smart_wallet:
      eth_rpc_url: ${ETHEREUM_RPC}
      bundler_url: ${ETHEREUM_BUNDLER_URL}
      controller_private_key: ${CONTROLLER_PRIVATE_KEY_MAINNET}
      paymaster_address: ${PAYMASTER_ADDRESS_MAINNET}
      # Mainnet production cap is 3; this branch (feature/rest-api-migration)
      # only feeds the testing environment, so we lift the cap to match the
      # testnet chains and let the v4 test suite churn through wallets.
      max_wallets_per_owner: 2000

  - chain_id: 8453
    name: base
    worker_addr: ${WORKER_BASE}
    smart_wallet:
      eth_rpc_url: ${BASE_RPC}
      bundler_url: ${BASE_BUNDLER_URL}
      controller_private_key: ${CONTROLLER_PRIVATE_KEY_MAINNET}
      paymaster_address: ${PAYMASTER_ADDRESS_MAINNET}
      # See chain 1 note above — relaxed for test-env churn only.
      max_wallets_per_owner: 2000

  - chain_id: 11155111
    name: sepolia
    worker_addr: ${WORKER_SEPOLIA}
    smart_wallet:
      eth_rpc_url: ${SEPOLIA_RPC}
      bundler_url: ${SEPOLIA_BUNDLER_URL}
      controller_private_key: ${CONTROLLER_PRIVATE_KEY_TESTNET}
      paymaster_address: ${PAYMASTER_ADDRESS_TESTNET}
      max_wallets_per_owner: 2000

  - chain_id: 84532
    name: base-sepolia
    worker_addr: ${WORKER_BASE_SEPOLIA}
    smart_wallet:
      eth_rpc_url: ${BASE_SEPOLIA_RPC}
      bundler_url: ${BASE_SEPOLIA_BUNDLER_URL}
      controller_private_key: ${CONTROLLER_PRIVATE_KEY_TESTNET}
      paymaster_address: ${PAYMASTER_ADDRESS_TESTNET}
      max_wallets_per_owner: 2000

  # BNB Smart Chain mainnet — connectivity-only rollout. The chain
  # has no SmartWallet factory deployed yet (avs-contracts Phase 2
  # deferred per avs-infra/Adding_A_New_Chain.md Phase 0.5), so
  # wallet ops will fail at execution. Event triggers + contractRead
  # work end-to-end. paymaster_address is a placeholder until BNB's
  # own paymaster is deployed; the value won't be called.
  - chain_id: 56
    name: bnb-mainnet
    worker_addr: ${WORKER_BNB}
    smart_wallet:
      eth_rpc_url: ${BNB_RPC}
      bundler_url: ${BNB_BUNDLER_URL}
      # BNB is a mainnet chain → mainnet controller (matches worker-bnb).
      # paymaster_address is a not-called testnet placeholder while
      # connectivity-only; the startup verifyingSigner probe is skipped
      # here because BNB_BUNDLER_URL is unset. When BNB wallet ops are
      # enabled, point PAYMASTER_ADDRESS at a real BNB mainnet paymaster
      # whose verifyingSigner equals this mainnet controller — the probe
      # will then enforce that pairing at boot.
      controller_private_key: ${CONTROLLER_PRIVATE_KEY_MAINNET}
      paymaster_address: ${PAYMASTER_ADDRESS_TESTNET}
      max_wallets_per_owner: 2000

macros:
  secrets:
    ap_notify_bot_token: ${TELEGRAM_BOT_TOKEN}
    sendgrid_key: ${SENDGRID_KEY}
    thegraph_api_key: ${THEGRAPH_API_KEY}
    moralis_api_key: ${MORALIS_API_KEY}

# Context-memory summarizer — enables `options.summarize: true` on
# terminal restApi nodes (SendGrid / Telegram) to auto-inject an
# AI-generated subject + body via the external context-memory service.
# Without this block, ComposeSummarySmart falls back to the
# deterministic summarizer (still useful, just no LLM polish).
#
# Set these on the `gateway` Railway service:
#   CONTEXT_MEMORY_URL      — https://context-api.avaprotocol.org (or staging variant)
#   CONTEXT_MEMORY_API_KEY  — bearer token issued by the context-memory deployment
notifications:
  summary:
    enabled: true
    provider: context-memory
    api_endpoint: ${CONTEXT_MEMORY_URL}
    api_key: ${CONTEXT_MEMORY_API_KEY}
