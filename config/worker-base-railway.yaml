# Worker configuration for Base mainnet on Railway (chain 8453)
#
# Secrets are injected via Railway sealed environment variables and
# expanded at startup (see core/config.ReadYamlConfig). Set these on
# the `worker-base` Railway service:
#   CHAIN_ENDPOINT (HTTPS; WS derived in code)
#   BUNDLER_URL
#   CONTROLLER_PRIVATE_KEY_MAINNET  — mainnet controller; its address must
#                                     equal PAYMASTER_ADDRESS's verifyingSigner
#                                     (0x3b6f68B9…). Share this secret with the
#                                     gateway + other mainnet workers so it
#                                     can't drift (Sentry EIGENLAYER-AVS-1W).
#   PAYMASTER_ADDRESS
environment: production

chain_id: 8453
chain_name: base

# Internal gRPC — Railway private networking
listen_address: "0.0.0.0:50051"

# Railway health check endpoint
health_address: "0.0.0.0:8080"

# Note: workers do NOT dial the gateway. The gateway discovers worker
# addresses from its WORKER_* env vars (set via Railway reference
# variables, e.g. `${{worker-base.RAILWAY_PRIVATE_DOMAIN}}:50051`) and
# dials in. Workers only listen on `listen_address`.

# Chain RPC endpoints (Base mainnet)
eth_rpc_url: ${CHAIN_ENDPOINT}

# Third-party bundler (self-hosted Voltaire)
bundler_url: ${BUNDLER_URL}

# Smart wallet config
smart_wallet:
  controller_private_key: ${CONTROLLER_PRIVATE_KEY_MAINNET}
  paymaster_address: ${PAYMASTER_ADDRESS}
