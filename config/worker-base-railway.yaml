# Worker configuration for Base mainnet on Railway (chain 8453)
#
# Secrets are injected via Railway sealed environment variables and
# expanded at startup (see core/config.ReadYamlConfig). Set these on
# the `worker-base` Railway service:
#   BASE_DWELLIR_RPC, BASE_DWELLIR_WS
#   BASE_BUNDLER_URL
#   CONTROLLER_PRIVATE_KEY
#   PAYMASTER_ADDRESS
environment: production

chain_id: 8453
chain_name: base

# Internal gRPC — Railway private networking
listen_address: "0.0.0.0:50051"

# Railway health check endpoint
health_address: "0.0.0.0:8080"

# Gateway address — mainnet workers register with `gateway-ethereum`
# (separate from the sepolia `gateway` service because the two AVS
# registrations cannot share). See RAILWAY_MIGRATION_PLAN.md.
gateway_address: "gateway-ethereum.railway.internal:2206"

# Chain RPC endpoints (Base mainnet)
eth_rpc_url: ${BASE_DWELLIR_RPC}
eth_ws_url: ${BASE_DWELLIR_WS}

# Third-party bundler (self-hosted Voltaire)
bundler_url: ${BASE_BUNDLER_URL}

# Smart wallet config
smart_wallet:
  controller_private_key: ${CONTROLLER_PRIVATE_KEY}
  paymaster_address: ${PAYMASTER_ADDRESS}
