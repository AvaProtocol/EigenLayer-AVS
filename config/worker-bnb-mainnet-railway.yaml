# Worker configuration for BNB Smart Chain Mainnet on Railway (chain 56).
#
# Connectivity-only rollout: this worker watches BNB chain events and
# can answer contractRead requests, but the chain has no SmartWallet
# factory deployed yet (avs-contracts Phase 2 deferred per
# avs-infra/Adding_A_New_Chain.md Phase 0.5). So:
#   - Event triggers + contractRead work end-to-end
#   - Smart-wallet ops (create, withdraw, contractWrite via UserOp)
#     will fail at execution until the factory + paymaster are
#     deployed and addresses wired up.
#
# Secrets are injected via Railway sealed env vars and expanded at
# startup. Set these on the `worker-bnb-mainnet` service:
#   CHAIN_ENDPOINT (HTTPS; WS derived in code)
#   BUNDLER_URL          — optional for connectivity-only; can be
#                              left unset (the YAML expansion will
#                              produce an empty string and bundler
#                              calls would no-op)
#   CONTROLLER_PRIVATE_KEY  — mainnet controller (BNB is a mainnet chain). On
#                              Railway set this to
#                              ${{shared.CONTROLLER_PRIVATE_KEY_MAINNET}}. Wallet
#                              ops are disabled while connectivity-only (no real
#                              paymaster), so the controller is not exercised
#                              yet; when BNB's own mainnet paymaster deploys,
#                              PAYMASTER_ADDRESS must resolve to a paymaster
#                              whose verifyingSigner equals this mainnet
#                              controller (0x3b6f68B9…).
#   PAYMASTER_ADDRESS        — shared (not used until paymaster
#                              deploys on BNB)
environment: production

chain_id: 56
chain_name: bnb-mainnet

# Internal gRPC — Railway private networking
listen_address: "0.0.0.0:50051"

# Railway health check endpoint
health_address: "0.0.0.0:8080"

# Note: workers do NOT dial the gateway. The gateway discovers worker
# addresses from its WORKER_* env vars and dials in. Workers only
# listen on `listen_address`.

# Chain RPC endpoints
eth_rpc_url: ${CHAIN_ENDPOINT}

# Bundler — left as an env var expansion. Unset in connectivity-only
# mode; populate once a 4337 bundler provider with BNB support is in
# place.
bundler_url: ${BUNDLER_URL}

# Smart wallet config
smart_wallet:
  controller_private_key: ${CONTROLLER_PRIVATE_KEY}
  paymaster_address: ${PAYMASTER_ADDRESS}
