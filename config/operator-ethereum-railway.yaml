# Operator configuration for Ethereum mainnet on Railway
#
# Mirrors the bare-metal `terraform/environments/production/ethereum-operator.yaml`
# layout but points at the Railway gateway over private networking.
# Secrets are injected via Railway sealed environment variables — set
# these on the `operator-ethereum` service:
#   CHAIN_ENDPOINT (HTTPS; WS derived in code)
#   ECDSA_KEY_JSON, BLS_KEY_JSON  (operator-entrypoint.sh writes these
#                                   to /app/keys/ at startup)
#   OPERATOR_BLS_KEY_PASSWORD, OPERATOR_ECDSA_KEY_PASSWORD
environment: production

operator_address: 0xc6B87cc9e85b07365b6aBEfff061F237F7cf7Dc3

# Ethereum mainnet AVS contracts
avs_registry_coordinator_address: 0x8DE3Ee0dE880161Aa0CD8Bf9F8F6a7AfEeB9A44B
operator_state_retriever_address: 0xb3af70D5f72C04D1f490ff49e5aB189fA7122713

# EigenLayer / AVS registration chain RPC (Ethereum mainnet). This is the
# chain the operator registers against — distinct from the destination chains
# it monitors (see `chains:` below).
eth_rpc_url: ${CHAIN_ENDPOINT}

# Key files — written at startup by scripts/operator-entrypoint.sh
ecdsa_private_key_store_path: /app/keys/ecdsa.key.json
bls_private_key_store_path: /app/keys/bls.key.json

# Gateway address — set via Railway reference variable so the
# topology is self-discovering. Set on the operator-ethereum service:
#   GATEWAY_ADDRESS=${{gateway.RAILWAY_PRIVATE_DOMAIN}}:2206
# Both operators (sepolia + ethereum) connect to the single `gateway`
# service. enforceAuth is currently false so the gateway's AVS
# coordinator doesn't gate operator connections; when BLS aggregation
# is turned on, this operator's mainnet AVS registration will
# validate against whatever the gateway then registers against.
aggregator_server_ip_port_address: ${GATEWAY_ADDRESS}

# Metrics
eigen_metrics_ip_port_address: 0.0.0.0:9090
enable_metrics: true
node_api_ip_port_address: 0.0.0.0:9010
enable_node_api: true

# Sentry
sentry_dsn: https://d304c8708d5097f7787eeb664e4098c6@o1156669.ingest.us.sentry.io/4509386759733248
server_name: "operator-ethereum-railway"

# Destination chains — all MAINNETS. This single operator monitors every
# mainnet the gateway routes (Ethereum, Base, BNB). Each chain's WS URL is
# derived from its HTTPS RPC in code (config.DeriveWsURL); set an explicit
# eth_ws_url here only if a provider serves WS on a different host/path.
# chain_id is validated against the RPC at startup — a mismatched RPC is
# soft-skipped (chain dropped from the advertised set) rather than crashing
# the operator. Set the per-chain RPC env vars on the operator-ethereum
# service: ETHEREUM_RPC, BASE_RPC, BNB_RPC.
chains:
  - chain_id: 1
    name: ethereum
    eth_rpc_url: ${ETHEREUM_RPC}
  - chain_id: 8453
    name: base
    eth_rpc_url: ${BASE_RPC}
  - chain_id: 56
    name: bnb-mainnet
    eth_rpc_url: ${BNB_RPC}

enabled_features:
  event_trigger: true
