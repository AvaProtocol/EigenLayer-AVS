# Worker configuration for Sepolia on Railway (chain 11155111).
#
# Secrets are injected via Railway sealed env vars and expanded at
# startup. Set these on the `worker-sepolia` service:
#   CHAIN_ENDPOINT (HTTPS; WS derived in code)
#   BUNDLER_URL
#   CONTROLLER_PRIVATE_KEY_TESTNET  — testnet controller; its address must
#                                     equal PAYMASTER_ADDRESS's verifyingSigner
#                                     (0x82F2Dd9a…). Share this secret with the
#                                     gateway + other testnet workers so it
#                                     can't drift (Sentry EIGENLAYER-AVS-1W).
#   PAYMASTER_ADDRESS
environment: production

chain_id: 11155111
chain_name: sepolia

# Internal gRPC — Railway private networking
listen_address: "0.0.0.0:50051"

# Railway health check endpoint
health_address: "0.0.0.0:8080"

# Note: workers do NOT dial the gateway. The gateway discovers worker
# addresses from its WORKER_* env vars and dials in. Workers only
# listen on `listen_address`.

# Chain RPC endpoints
eth_rpc_url: ${CHAIN_ENDPOINT}

# Third-party bundler (self-hosted Voltaire)
bundler_url: ${BUNDLER_URL}

# Smart wallet config
smart_wallet:
  controller_private_key: ${CONTROLLER_PRIVATE_KEY_TESTNET}
  paymaster_address: ${PAYMASTER_ADDRESS}
