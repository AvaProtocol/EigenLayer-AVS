syntax = "proto3";
package aggregator;

option go_package = "./avsproto";

// ChainWorker is the internal gRPC service running on each chain worker.
// The gateway connects to workers by chain_id using addresses from config.
// Workers handle chain-specific operations: UserOp execution, nonce queries,
// smart wallet derivation, token enrichment, and gas estimation.
service ChainWorker {
  // Health check - gateway verifies worker connectivity and chain status
  rpc WorkerHealthCheck(WorkerHealthCheckReq) returns (WorkerHealthCheckResp);

  // Execute a UserOp on this chain via the bundler
  rpc ExecuteUserOp(ExecuteUserOpReq) returns (ExecuteUserOpResp);

  // Get the nonce for a smart wallet on this chain
  rpc GetNonce(WorkerGetNonceReq) returns (WorkerGetNonceResp);

  // Get the smart wallet address for an owner on this chain
  rpc GetSmartWalletAddress(WorkerGetSmartWalletAddressReq) returns (WorkerGetSmartWalletAddressResp);

  // Get token metadata (enrichment) for a contract address on this chain
  rpc GetTokenMetadata(WorkerGetTokenMetadataReq) returns (WorkerGetTokenMetadataResp);

  // Get the nonce for an arbitrary smart wallet address on this chain.
  // Differs from GetNonce in that the caller already knows the wallet
  // address (looked up from gateway storage) and doesn't want to re-derive
  // it from (owner, salt). Used by REST handlers that read the nonce
  // directly off the EntryPoint contract.
  rpc GetNonceByAddress(WorkerGetNonceByAddressReq) returns (WorkerGetNonceResp);

  // Suggest a gas price for this chain. Wraps ethclient.SuggestGasPrice.
  // Used by the fee estimator to price UserOps.
  rpc SuggestGasPrice(WorkerSuggestGasPriceReq) returns (WorkerSuggestGasPriceResp);

  // Estimate gas for a contract call on this chain. Wraps
  // ethclient.EstimateGas with the same CallMsg shape ethclient takes.
  // Used by the fee estimator to gas-budget UserOp executions.
  rpc EstimateGas(WorkerEstimateGasReq) returns (WorkerEstimateGasResp);

  // Read the bytecode at a contract address. Wraps ethclient.CodeAt.
  // Used by the fee estimator to detect whether the runner contract is
  // deployed before issuing UserOps against it.
  rpc GetCode(WorkerGetCodeReq) returns (WorkerGetCodeResp);

  // Read the native-coin balance (wei) at an address. Wraps
  // ethclient.BalanceAt(latest). Used by the gateway's withdraw preflight
  // to validate / size native-token withdrawals.
  rpc GetBalance(WorkerGetBalanceReq) returns (WorkerGetBalanceResp);

  // Read an ERC-20 token balance for an owner. Wraps erc20.BalanceOf.
  // Used by the gateway's withdraw preflight to validate / size ERC-20
  // withdrawals.
  rpc GetTokenBalance(WorkerGetTokenBalanceReq) returns (WorkerGetTokenBalanceResp);

  // Execute a read-only contract call (eth_call) on this chain. Wraps
  // ethclient.CallContract. Used by the contractRead node so the gateway
  // issues no direct eth_call against execution chains.
  rpc CallContract(WorkerCallContractReq) returns (WorkerCallContractResp);

  // Read a block header's number, hash, and timestamp. Wraps
  // ethclient.HeaderByNumber. Used to stamp simulation receipts and
  // enrich event timestamps without a gateway-side chain dial.
  rpc GetBlockHeader(WorkerGetBlockHeaderReq) returns (WorkerGetBlockHeaderResp);

  // Read the latest block number. Wraps ethclient.BlockNumber. Used by the
  // immediate-trigger path to stamp the current block for the operator.
  rpc GetBlockNumber(WorkerGetBlockNumberReq) returns (WorkerGetBlockNumberResp);
}

// Health check
message WorkerHealthCheckReq {}

message WorkerHealthCheckResp {
  string status = 1;        // "OK", "DEGRADED", etc.
  int64 chain_id = 2;
  string chain_name = 3;
  int64 latest_block = 4;   // Latest block number from chain RPC
}

// UserOp execution
message ExecuteUserOpReq {
  string owner = 1;                 // Owner EOA address (hex)
  bytes call_data = 2;              // Encoded calldata for execute/executeBatch
  string smart_wallet_address = 3;  // Smart wallet address override (hex, optional)
  bool use_paymaster = 4;           // Whether to use paymaster for gas sponsorship
}

message ExecuteUserOpResp {
  bool success = 1;
  string tx_hash = 2;          // On-chain transaction hash
  string error = 3;            // Error message if failed
  string user_op_hash = 4;     // ERC-4337 UserOp hash
  uint64 gas_used = 5;
  string gas_cost_wei = 6;     // Total gas cost in wei (big.Int as string)
}

// Nonce query
message WorkerGetNonceReq {
  string owner = 1;    // Owner EOA address (hex)
  int64 salt = 2;      // Key/salt for nonce space
}

message WorkerGetNonceResp {
  string nonce = 1;    // big.Int as string
}

// Smart wallet address derivation
message WorkerGetSmartWalletAddressReq {
  string owner = 1;            // Owner EOA address (hex)
  string salt = 2;             // CREATE2 salt (big.Int as base-10 string)
  string factory_address = 3;  // Factory override (hex). Empty = worker's
                               // configured factory. The gateway passes the
                               // per-chain / per-request factory so derivation
                               // matches GetWallet's direct-RPC path exactly.
}

message WorkerGetSmartWalletAddressResp {
  string address = 1;  // Derived smart wallet address (hex)
}

// Token metadata enrichment
message WorkerGetTokenMetadataReq {
  string contract_address = 1;  // ERC20 token contract address (hex)
}

message WorkerGetTokenMetadataResp {
  string name = 1;
  string symbol = 2;
  uint32 decimals = 3;
  bool found = 4;       // Whether the token was found
  string source = 5;    // "whitelist", "rpc", or "native"
}

// Nonce query by smart wallet address (companion to GetNonce-by-owner)
message WorkerGetNonceByAddressReq {
  string wallet_address = 1;  // Smart wallet address (hex)
  string nonce_key = 2;       // 192-bit key for the EntryPoint nonce space
                              // (big.Int as string; "0" for the default space)
}

// Gas price
message WorkerSuggestGasPriceReq {}

message WorkerSuggestGasPriceResp {
  string gas_price_wei = 1;   // big.Int as string
}

// Gas estimate (mirrors ethereum.CallMsg fields the estimator uses)
message WorkerEstimateGasReq {
  string from = 1;     // Sender (hex). Optional; chain default if empty.
  string to = 2;       // Destination contract (hex).
  string value = 3;    // Wei (big.Int as string); empty/zero for no value.
  bytes data = 4;      // Calldata.
}

message WorkerEstimateGasResp {
  uint64 gas = 1;
}

// CodeAt
message WorkerGetCodeReq {
  string address = 1;  // Contract address (hex).
}

message WorkerGetCodeResp {
  bytes code = 1;      // Raw bytecode (empty if not deployed).
}

// Native-coin balance
message WorkerGetBalanceReq {
  string address = 1;  // Account address (hex).
}

message WorkerGetBalanceResp {
  string balance_wei = 1;  // Native balance in wei (big.Int as string).
}

// ERC-20 token balance
message WorkerGetTokenBalanceReq {
  string token_address = 1;  // ERC-20 contract address (hex).
  string owner_address = 2;  // Balance holder address (hex).
}

message WorkerGetTokenBalanceResp {
  string balance = 1;  // Raw token balance (big.Int as string, no decimals applied).
}

// Read-only contract call (eth_call). Mirrors the ethereum.CallMsg fields
// the contractRead path uses.
message WorkerCallContractReq {
  string from = 1;          // Caller (hex). Optional; chain default if empty.
  string to = 2;            // Target contract (hex). Required.
  string value = 3;         // Wei (big.Int as string); empty/zero for none.
  bytes data = 4;           // ABI-encoded calldata.
  string block_number = 5;  // Block height (big.Int as string); empty = latest.
}

message WorkerCallContractResp {
  bytes result = 1;         // Raw ABI-encoded return bytes.
}

// Block header (the subset of fields the gateway reads). A full
// types.Header can't be reconstructed faithfully over gRPC — its hash
// depends on every field — so the worker returns these explicit values.
message WorkerGetBlockHeaderReq {
  string block_number = 1;  // big.Int as string; empty = latest.
}

message WorkerGetBlockHeaderResp {
  uint64 number = 1;        // Block number.
  string hash = 2;          // 0x-prefixed block hash.
  uint64 time = 3;          // Unix timestamp (seconds).
  string parent_hash = 4;   // 0x-prefixed parent block hash.
  string difficulty = 5;    // big.Int as base-10 string.
  uint64 gas_limit = 6;     // Block gas limit.
  uint64 gas_used = 7;      // Block gas used.
}

// Latest block number
message WorkerGetBlockNumberReq {}

message WorkerGetBlockNumberResp {
  uint64 number = 1;        // Latest block number.
}
